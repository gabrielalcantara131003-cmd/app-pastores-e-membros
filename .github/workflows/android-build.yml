name: Build Android App Bundle

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Keystore file
        run: |
          python3 -c "
          import base64, os, sys
          data = os.environ.get('KEYSTORE_DATA')
          if not data:
              print('❌ ERRO: O segredo ANDROID_KEYSTORE_BASE64 está vazio ou não foi encontrado nas configurações do GitHub!')
              sys.exit(1)
          try:
              # Filtra APENAS caracteres válidos do alfabeto Base64 (A-Z, a-z, 0-9, +, /, =)
              valid_chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/='
              clean_data = ''.join(c for c in data if c in valid_chars)
              
              # Decodifica (Python adiciona padding automaticamente se necessário)
              missing_padding = len(clean_data) % 4
              if missing_padding:
                  clean_data += '=' * (4 - missing_padding)
                  
              decoded = base64.b64decode(clean_data)
              with open('android.keystore', 'wb') as f:
                  f.write(decoded)
              print(f'✅ Keystore criada com sucesso! (Tamanho filtrado: {len(clean_data)} caracteres)')
          except Exception as e:
              print(f'❌ ERRO de Decodificação: {e}')
              print('Verifique se o segredo no GitHub é um Base64 válido.')
              sys.exit(1)
          "
        env:
          KEYSTORE_DATA: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Debug - List Files
        run: ls -R

      - name: Configure Bubblewrap Paths
        run: |
          mkdir -p ~/.bubblewrap
          cat <<EOF > ~/.bubblewrap/config.json
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF

      - name: Build PAGO Version
        run: |
          # Redirecionar /dev/null evita que o terminal trave se a senha estiver errada
          echo "Tentando senha 'android' (padrão do app)..."
          if bubblewrap build --signingKeyPath android.keystore --signingKeyAlias "android" --signingKeyPassword "android" --keyStorePassword "android" --skip-directory-check < /dev/null; then
             echo "✅ Senha 'android' funcionou!"
          else
             echo "Tentando senha 'igreja1234'..."
             if bubblewrap build --signingKeyPath android.keystore --signingKeyAlias "android" --signingKeyPassword "igreja1234" --keyStorePassword "igreja1234" --skip-directory-check < /dev/null; then
                echo "✅ Senha 'igreja1234' funcionou!"
             else
                echo "❌ Ambas as senhas falharam. Gerando chave nova garantida..."
                keytool -genkeypair -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass "igreja1234" -keypass "igreja1234" -dname "CN=App, OU=Dev, O=Igreja, L=BR, S=BR, C=BR" || true
                bubblewrap build --signingKeyPath android.keystore --signingKeyAlias "android" --signingKeyPassword "igreja1234" --keyStorePassword "igreja1234" --skip-directory-check < /dev/null
             fi
          fi
          for f in *.apk; do mv "$f" "Pastores-PAGO.apk"; break; done
          for f in *.aab; do mv "$f" "Pastores-PAGO.aab"; break; done

      - name: Switch to CORTESIA Mode
        run: |
          sed -i 's/const IS_FREE_VERSION = (function()/\/\/ CORTESIA: forçar true\nconst IS_FREE_VERSION = true; \/\/ (function()/g' app.js || true
          # Alterar startUrl no twa-manifest.json para incluir ?version=cortesia
          sed -i 's|"startUrl": "/?source=pwa"|"startUrl": "/?source=pwa\&version=cortesia"|g' twa-manifest.json
          echo "✅ Modo cortesia ativado — startUrl atualizado com ?version=cortesia"
          cat twa-manifest.json | grep startUrl

      - name: Build CORTESIA Version
        run: |
          # Usa a mesma versão que deu certo acima, pois se precisou gerar uma nova chave ela já está salva com a senha igreja1234
          if bubblewrap build --signingKeyPath android.keystore --signingKeyAlias "android" --signingKeyPassword "android" --keyStorePassword "android" --skip-directory-check < /dev/null || bubblewrap build --signingKeyPath android.keystore --signingKeyAlias "android" --signingKeyPassword "igreja1234" --keyStorePassword "igreja1234" --skip-directory-check < /dev/null; then
             echo "✅ Build cortesia finalizado com sucesso."
          else
             echo "❌ Falha no build cortesia impossivel!"
             exit 1
          fi
          for f in *.apk; do mv "$f" "Pastores-CORTESIA.apk"; break; done
          for f in *.aab; do mv "$f" "Pastores-CORTESIA.aab"; break; done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Versoes-Android-Pastores
          path: |
            Pastores-PAGO.apk
            Pastores-PAGO.aab
            Pastores-CORTESIA.apk
            Pastores-CORTESIA.aab
