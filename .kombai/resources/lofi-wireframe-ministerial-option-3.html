<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe Opção 3 — Ousada</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Comic Sans MS', 'Segoe Print', cursive; background: #e8e8e8; color: #333; padding: 24px; }
  h1.page-title { text-align: center; font-size: 1.6rem; margin-bottom: 8px; color: #222; }
  p.page-desc { text-align: center; color: #666; font-size: 0.95rem; margin-bottom: 32px; max-width: 700px; margin-left: auto; margin-right: auto; }
  .nav-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 40px; }
  .nav-links a { background: #fff; border: 2px solid #999; border-radius: 20px; padding: 6px 16px; font-size: 0.8rem; color: #333; text-decoration: none; }
  .nav-links a:hover { background: #ddd; }
  .screen-section { max-width: 430px; margin: 0 auto 60px; }
  .screen-label { font-size: 1.1rem; font-weight: bold; color: #444; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px dashed #aaa; }
  .phone { background: #fff; border: 3px solid #666; border-radius: 32px; overflow: hidden; box-shadow: 4px 4px 0 #bbb; }
  .status-bar { background: #f5f5f5; padding: 6px 16px; display: flex; justify-content: space-between; font-size: 0.65rem; color: #999; border-bottom: 1px solid #ddd; }
  .badge-reuse { position: absolute; top: -6px; right: -6px; background: #4CAF50; color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 9px; font-family: Arial, sans-serif; font-weight: bold; z-index: 10; white-space: nowrap; }
  .badge-new { position: absolute; top: -6px; right: -6px; background: #FF9800; color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 9px; font-family: Arial, sans-serif; font-weight: bold; z-index: 10; white-space: nowrap; }
  .rel { position: relative; }
  .content { padding: 16px; min-height: 500px; }
  .section-lbl { font-size: 0.6rem; color: #999; text-transform: uppercase; letter-spacing: 0.1em; font-weight: bold; margin-bottom: 10px; margin-top: 16px; }

  /* === OPTION 3 UNIQUE STYLES === */
  /* Drawer-style navigation */
  .drawer-overlay { position: relative; }
  .drawer { background: #333; color: #fff; border-radius: 0 24px 24px 0; width: 280px; padding: 40px 20px 20px; min-height: 500px; }
  .drawer-header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid #555; }
  .drawer-avatar { width: 48px; height: 48px; background: #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; }
  .drawer-user h4 { font-size: 0.85rem; }
  .drawer-user span { font-size: 0.6rem; color: #aaa; }
  .drawer-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 12px; margin-bottom: 4px; font-size: 0.8rem; color: #ccc; }
  .drawer-item.active { background: #555; color: #fff; }
  .drawer-item .di-icon { width: 28px; text-align: center; font-size: 1rem; }
  .drawer-divider { height: 1px; background: #555; margin: 12px 0; }
  /* Minimal top bar */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
  .topbar-menu { width: 32px; height: 32px; border: 2px solid #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
  .topbar-title { font-size: 0.9rem; font-weight: bold; color: #222; }
  .topbar-icons { display: flex; gap: 6px; }
  .topbar-btn { width: 30px; height: 30px; border: 2px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
  /* Full-width hero verse */
  .verse-hero { background: #333; color: #fff; padding: 32px 20px; text-align: center; margin: 0 -16px 16px; }
  .verse-hero .vh-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.15em; color: #999; margin-bottom: 12px; }
  .verse-hero .vh-text { font-style: italic; font-size: 1rem; line-height: 1.8; margin-bottom: 12px; max-width: 340px; margin-left: auto; margin-right: auto; }
  .verse-hero .vh-ref { font-size: 0.8rem; color: #888; font-weight: bold; }
  .verse-hero .vh-share { margin-top: 12px; display: inline-block; padding: 6px 16px; border: 1px solid #666; border-radius: 20px; font-size: 0.65rem; color: #aaa; }
  /* Fluid bento */
  .fluid-bento { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .fluid-bento .fb-wide { grid-column: 1 / -1; }
  .fb-card { background: #f5f5f5; border: 2px solid #ddd; border-radius: 20px; padding: 16px; }
  .fb-card .fb-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .fb-card .fb-icon { width: 36px; height: 36px; border-radius: 10px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
  .fb-card .fb-arrow { font-size: 0.7rem; color: #ccc; }
  .fb-card h5 { font-size: 0.8rem; color: #222; }
  .fb-card p { font-size: 0.6rem; color: #999; }
  /* Stats ribbon */
  .stats-ribbon { display: flex; justify-content: space-around; background: #f5f5f5; border: 2px solid #ddd; border-radius: 16px; padding: 14px; margin-bottom: 16px; }
  .sr-stat { text-align: center; }
  .sr-stat .sr-num { font-size: 1.3rem; font-weight: bold; color: #222; }
  .sr-stat .sr-lbl { font-size: 0.5rem; color: #999; text-transform: uppercase; }
  .sr-divider { width: 1px; background: #ddd; }
  /* Activity timeline */
  .timeline { border-left: 2px solid #ddd; margin-left: 10px; padding-left: 16px; }
  .tl-item { position: relative; margin-bottom: 16px; }
  .tl-item::before { content: ''; position: absolute; left: -21px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: #333; border: 2px solid #fff; }
  .tl-item .tl-time { font-size: 0.55rem; color: #999; margin-bottom: 2px; }
  .tl-item h5 { font-size: 0.75rem; color: #222; }
  .tl-item p { font-size: 0.6rem; color: #999; }
  /* No bottom nav — uses FAB + drawer */
  .central-fab { width: 56px; height: 56px; background: #333; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; margin: 16px auto; box-shadow: 3px 3px 0 #999; }
  .fab-label { text-align: center; font-size: 0.6rem; color: #999; margin-top: -8px; margin-bottom: 16px; }
  /* Mini action bar at bottom */
  .mini-bar { display: flex; justify-content: center; gap: 12px; padding: 10px; background: #f5f5f5; border-top: 2px solid #ddd; }
  .mini-btn { width: 40px; height: 40px; border: 2px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; background: #fff; }
  .mini-btn.active { background: #333; color: #fff; border-color: #333; }
  /* General reusables */
  .chips { display: flex; gap: 6px; margin-bottom: 14px; }
  .chip { padding: 5px 12px; border-radius: 20px; font-size: 0.65rem; font-weight: bold; border: 2px solid #ccc; background: #fff; color: #666; }
  .chip.active { background: #333; color: #fff; border-color: #333; }
  .tabs-bar { display: flex; background: #eee; border-radius: 20px; padding: 3px; margin-bottom: 14px; }
  .tab { flex: 1; text-align: center; padding: 8px; font-size: 0.7rem; border-radius: 18px; color: #999; font-weight: bold; }
  .tab.active { background: #fff; color: #333; box-shadow: 1px 1px 0 #ccc; }
  .search-bar { display: flex; align-items: center; background: #f5f5f5; border: 2px solid #ddd; border-radius: 24px; padding: 10px 16px; margin-bottom: 12px; gap: 8px; }
  .search-bar input { background: none; border: none; font-family: inherit; font-size: 0.8rem; flex: 1; outline: none; }
  .member-row { display: flex; align-items: center; gap: 10px
